<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VSelf</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #1a0a2e;
        }

        /* ===== START PAGE ===== */
        #startPage {
            background: #6a0dad;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 10;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        #startPage.hidden {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }

        .start-content {
            text-align: center;
        }

        .start-title {
            color: white;
            font-size: 52px;
            font-weight: 800;
            margin-bottom: 8px;
            text-shadow: 2px 2px 20px rgba(0,0,0,0.2);
            letter-spacing: 2px;
        }

        .start-sub {
            color: rgba(255,255,255,0.8);
            font-size: 18px;
            margin-bottom: 30px;
        }

        .start-btn {
            padding: 16px 60px;
            font-size: 26px;
            font-weight: bold;
            color: #6a0dad;
            background: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 8px 30px rgba(0,0,0,0.25);
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
        }

        /* ===== PROFILE PAGE ===== */
        #profilePage {
            background: linear-gradient(135deg, #f5f0ff 0%, #e8d5f5 100%);
            width: 100%;
            min-height: 100vh;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            flex-direction: column;
        }

        #profilePage.show {
            display: flex;
        }

        .card {
            background: white;
            border-radius: 30px;
            padding: 40px 35px;
            max-width: 460px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(106, 13, 173, 0.2);
            text-align: center;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #6a0dad;
            box-shadow: 0 8px 25px rgba(106, 13, 173, 0.25);
            margin-bottom: 15px;
        }

        .card h1 {
            color: #4a0a7a;
            font-size: 32px;
        }

        .card .subtitle {
            color: #888;
            font-size: 16px;
            margin: 5px 0 20px 0;
        }

        .info-item {
            background: #f8f4ff;
            padding: 12px 16px;
            border-radius: 12px;
            margin: 8px 0;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-item .label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .info-item .value {
            font-size: 17px;
            font-weight: 600;
            color: #2d1b3d;
        }

        .badge {
            display: inline-block;
            background: #6a0dad;
            color: white;
            padding: 6px 24px;
            border-radius: 50px;
            font-size: 14px;
            margin-top: 12px;
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            text-align: center;
        }

        .footer p {
            color: #bbb;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .footer span {
            color: #6a0dad;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <!-- ===== START PAGE ===== -->
    <div id="startPage">
        <div class="start-content">
            <h1 class="start-title">VSelf</h1>
            <p class="start-sub">Get to know me</p>
            <button class="start-btn" id="startBtn">✨ Start</button>
        </div>
    </div>

    <!-- ===== PROFILE PAGE ===== -->
    <div id="profilePage">
        <div class="card">
            <img src="https://files.catbox.moe/wq23gz.jpg" alt="Nur Damia" class="profile-img" />

            <h1>Nur Damia</h1>
            <p class="subtitle">🌸 "Dream big, sleep well"</p>

            <div class="info-item">
                <span class="label">Age</span>
                <span class="value">14</span>
            </div>
            <div class="info-item">
                <span class="label">Birthday</span>
                <span class="value">7 June 2012</span>
            </div>
            <div class="info-item">
                <span class="label">From</span>
                <span class="value">Kelantan</span>
            </div>
            <div class="info-item">
                <span class="label">School</span>
                <span class="value">SMK PAK BADOL</span>
            </div>
            <div class="info-item">
                <span class="label">Hobby</span>
                <span class="value">💤 Sleeping</span>
            </div>

            <span class="badge">💜 Nice to meet you!</span>

            <div class="footer">
                <p>Powered by <span>Veyora</span></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('startBtn').addEventListener('click', function() {
            document.getElementById('startPage').classList.add('hidden');
            document.getElementById('profilePage').classList.add('show');
        });
    </script>

</body>
</html>
